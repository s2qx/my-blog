# ─────────────────────────────────────────────────────────────────
# Decap CMS config — edit fields here any time you want to add/remove
# a field from an editing form. This file IS the admin dashboard.
# ─────────────────────────────────────────────────────────────────

backend:
  name: github
  repo: s2qx/my-blog
  branch: main
  base_url: https://almubaireek.com
  auth_endpoint: api/auth

publish_mode: editorial_workflow

site_url: https://almubaireek.com
display_url: https://almubaireek.com
logo_url: /images/hero-banner.jpg

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:

  # ── Singleton Pages ──────────────────────────────────────────────
  - name: "pages"
    label: "Pages"
    files:
      - file: "content/_index.md"
        label: "Home"
        name: "home"
        fields:
          - { label: "Title", name: "title", widget: "string", default: "Welcome to My Blog" }
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Intro text", name: "intro", widget: "text" }
          - { label: "Hero image", name: "image", widget: "image", required: false }
          - { label: "Draft", name: "draft", widget: "boolean", default: false }

      - file: "content/about.md"
        label: "About"
        name: "about"
        fields:
          - { label: "Title", name: "title", widget: "string", default: "About" }
          - { label: "Body", name: "body", widget: "markdown" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false }

      - file: "content/contact.md"
        label: "Contact"
        name: "contact"
        fields:
          - { label: "Title", name: "title", widget: "string", default: "Contact" }
          - { label: "Full name", name: "full_name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - label: "Links"
            name: "links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Description", name: "description", widget: "string" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false }

      - file: "content/pcb-hardware/_index.md"
        label: "PCB & Hardware"
        name: "pcb-hardware"
        fields:
          - { label: "Title", name: "title", widget: "string", default: "PCB & Hardware" }
          - { label: "Intro", name: "intro", widget: "text", required: false }
          - label: "Builds"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Images"
                name: "images"
                widget: "list"
                field: { label: "Image", name: "image", widget: "image" }
              - { label: "Link to full project (optional)", name: "link", widget: "string", required: false }
          - { label: "Draft", name: "draft", widget: "boolean", default: false }

  # ── Projects (course projects, competitions, personal builds) ──
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short description (used on cards)", name: "description", widget: "text" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Course Project", "Competition", "Personal Project", "IoT", "3D Print"]
      - { label: "Date", name: "date", widget: "datetime" }
      - label: "Images"
        name: "images"
        widget: "list"
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Report / file link", name: "report_link", widget: "string", required: false }
      - { label: "YouTube video ID (optional)", name: "video", widget: "string", required: false, hint: "Just the ID, e.g. HvS1qOeyHkE" }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Full write-up", name: "body", widget: "markdown" }

  # ── Tutorials ─────────────────────────────────────────────────
  - name: "tutorials"
    label: "Tutorials"
    label_singular: "Tutorial"
    folder: "content/tutorials"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short description", name: "description", widget: "text" }
      - { label: "YouTube video ID (optional)", name: "youtube", widget: "string", required: false }
      - label: "Download links"
        name: "downloads"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - label: "Images"
        name: "images"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Body", name: "body", widget: "markdown" }

  # ── 3D Designs ────────────────────────────────────────────────
  - name: "designs3d"
    label: "3D Designs"
    label_singular: "3D Design"
    folder: "content/3d-design"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short description", name: "description", widget: "text" }
      - label: "Images"
        name: "images"
        widget: "list"
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Thingiverse / model link", name: "thingiverse_link", widget: "string", required: false }
      - { label: "Notes", name: "notes", widget: "text", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Body (optional extra detail)", name: "body", widget: "markdown", required: false }
