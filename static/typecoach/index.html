function getWeakKeys(keyStats, n=5){
  return Object.entries(keyStats)
    .filter(([,v])=>v.total>3)
    .sort(([,a],[,b])=>(b.errors/b.total)-(a.errors/a.total))
    .slice(0,n).map(([k])=>k);
}

function generateWeakDrillText(weakKeys){
  if(!weakKeys.length) return 'asdf jkl; asdf jkl;';
  const drills=[];
  weakKeys.forEach(k=>{
    drills.push(k.repeat(5));
    if(weakKeys.length>1){
      const pair=weakKeys[(weakKeys.indexOf(k)+1)%weakKeys.length];
      drills.push((k+pair).repeat(3));
    }
  });
  const allWords=LESSONS.flatMap(l=>l.words).filter(w=>weakKeys.some(k=>w.includes(k)));
  const picked=allWords.sort(()=>Math.random()-0.5).slice(0,6);
  return [...drills, ...picked].sort(()=>Math.random()-0.5).slice(0,10).join(' ');
}

function generateText(lesson, weakKeys=[]){
  let pool=[...lesson.words];
  if(weakKeys.length){
    const extras=LESSONS.flatMap(l=>l.words).filter(w=>weakKeys.some(k=>w.includes(k)));
    if(extras.length) pool=[...pool,...extras,...extras];
  }
  return pool.sort(()=>Math.random()-0.5).slice(0,8).join(' ');
}

function generateCustomText(keys, isArabic=false){
  if(!keys.trim()) return 'type something here';
  const ks=keys.toLowerCase().replace(/\s/g,'').split('');
  if(isArabic) return keys.repeat ? keys+' '+keys : keys;
  const drills=[];
  ks.forEach(k=>{drills.push(k.repeat(4));});
  ks.forEach((k,i)=>{if(i<ks.length-1)drills.push(k+ks[i+1]+k+ks[i+1]);});
  const matchWords=LESSONS.flatMap(l=>l.words).filter(w=>ks.some(k=>w.includes(k)));
  const extra=matchWords.sort(()=>Math.random()-0.5).slice(0,5);
  return [...drills,...extra].sort(()=>Math.random()-0.5).join(' ');
}

function calcXpForLevel(l){return l*200}
function calcLevel(xp){let l=1,acc=0;while(acc+calcXpForLevel(l)<=xp){acc+=calcXpForLevel(l);l++}return l}
function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return`${m}:${sec.toString().padStart(2,'0')}`}
function fmtDate(d){if(!d)return'Never';const now=new Date();const diff=Math.floor((now-new Date(d))/(1000*60*60*24));if(diff===0)return'Today';if(diff===1)return'Yesterday';return`${diff}d ago`}

function generateCoachFeedback(result, keyStats){
  const tips=[];
  const weakKeys=getWeakKeys(keyStats,3);
  const fingerGroups={
    'Pinky keys':['q','a','z','p',';'],
    'Ring finger':['w','s','x','o','l'],
    'Middle finger':['e','d','c','i','k'],
    'Index finger':['r','f','v','t','g','y','h','n','u','j','m'],
  };
  let worstFinger=null, worstRate=0;
  Object.entries(fingerGroups).forEach(([finger,keys])=>{
    let tot=0,err=0;
    keys.forEach(k=>{const st=keyStats[k];if(st){tot+=st.total;err+=st.errors;}});
    if(tot>5&&err/tot>worstRate){worstRate=err/tot;worstFinger=finger;}
  });
  if(worstFinger&&worstRate>0.2) tips.push(`⚠ You struggle with ${worstFinger} — try the Weak Key drill.`);
  if(result.accuracy<70) tips.push('🎯 Accuracy below 70% — slow down and focus on correct keys, not speed.');
  else if(result.accuracy>=95&&result.wpm<30) tips.push('✨ Great accuracy! Now challenge yourself to increase speed gradually.');
  else if(result.accuracy>=90) tips.push('🏆 Excellent accuracy! Your muscle memory is building nicely.');
  if(result.wpm>=50) tips.push('🚀 Impressive speed! Make sure accuracy stays above 90%.');
  if(weakKeys.length) tips.push(`💡 Keys needing attention: ${weakKeys.map(k=>`"${k}"`).join(', ')} — try Weak Key Mode.`);
  if(result.errors===0) tips.push('💎 Zero errors! Perfect session — your fingers are learning fast.');
  if(!tips.length) tips.push('👍 Good session! Consistency is the key to improvement.');
  return tips.slice(0,3);
}

function checkNewAchievements(store, prevAchievements){
  const earned=[];
  ACHIEVEMENTS.forEach(a=>{
    if(!prevAchievements.includes(a.id)&&a.check(store)) earned.push(a.id);
  });
  return earned;
}

}

function exportCSV(sessions){
  const header='Date,Lesson,Accuracy,WPM,Errors,Duration(s),XP,Mode';
  const rows=sessions.map(s=>[
    new Date(s.date).toLocaleString(),
    s.lessonId,
    Math.round(s.accuracy),
    Math.round(s.wpm),
    s.errors,
    s.duration||0,
    s.xpGained||0,
    s.mode||'normal',
  ].join(','));
  const blob=new Blob([[header,...rows].join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='typecoach_sessions.csv';a.click();
  URL.revokeObjectURL(url);
}

/* Lessons */
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.lesson-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.lesson-card:hover:not(.locked){border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow)}
.lesson-card.locked{opacity:0.45;cursor:not-allowed}
.lesson-card.completed::after{content:'✓';position:absolute;top:12px;right:14px;color:var(--green);font-weight:700;font-size:16px}
.lesson-card.arabic-card{border-left:3px solid var(--pink)}
.lesson-tag{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.lesson-tag.l1{background:var(--green-bg);color:var(--green)}
.lesson-tag.l2{background:var(--blue-bg);color:var(--blue)}
.lesson-tag.l3{background:var(--accent-bg);color:var(--accent)}
.lesson-tag.l4{background:var(--amber-bg);color:var(--amber)}
.lesson-tag.l5{background:var(--red-bg);color:var(--red)}
.lesson-tag.arabic{background:var(--pink-bg);color:var(--pink)}
.lesson-card h3{font-size:14px;font-weight:600;margin-bottom:4px}
.lesson-card p{font-size:12px;color:var(--text2)}
.lesson-keys{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--surface2);padding:3px 8px;border-radius:6px;color:var(--text2);margin-top:8px;display:inline-block}

/* Practice */
.practice-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.practice-stats{display:flex;gap:10px;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:30px;padding:6px 14px}
.stat-pill .sp-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.stat-pill .sp-val{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-pill.sp-acc .sp-val{color:var(--green)}
.stat-pill.sp-wpm .sp-val{color:var(--accent2)}
.stat-pill.sp-timer .sp-val{color:var(--amber)}
.stat-pill.sp-err .sp-val{color:var(--red)}
.stat-pill.sp-net .sp-val{color:var(--blue)}

.typing-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:28px;margin-bottom:16px;min-height:140px;position:relative;cursor:text}
.typing-display{font-family:'JetBrains Mono',monospace;font-size:26px;line-height:1.7;letter-spacing:0.02em;user-select:none;word-break:break-word;min-height:80px}
.typing-display.arabic-display{font-family:'Noto Naskh Arabic',serif;font-size:28px;direction:rtl;text-align:right;letter-spacing:0}
.char{position:relative;transition:color 0.05s}
.char.correct{color:var(--text2)}
.char.error{color:var(--red);background:var(--red-bg);border-radius:2px}
.char.current{color:var(--text);background:var(--accent);border-radius:3px}
.char.pending{color:var(--text3)}
.char.blind{color:transparent;background:var(--surface2);border-radius:2px;min-width:8px;display:inline-block}
.char.blind.current{background:var(--accent)}
.char.blind.error{background:var(--red-bg)}

.focus-banner{border-radius:var(--r);padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;flex-wrap:wrap;gap:8px}
.focus-banner.eyes{background:var(--amber-bg);border:1px solid rgba(255,179,71,0.3);color:var(--amber)}
.focus-banner.blind{background:var(--blue-bg);border:1px solid rgba(79,195,247,0.3);color:var(--blue)}
.focus-banner.strict{background:var(--red-bg);border:1px solid rgba(255,92,92,0.25);color:var(--red)}
.focus-banner.weak{background:var(--pink-bg);border:1px solid rgba(248,124,190,0.3);color:var(--pink)}
.focus-banner.paused{background:var(--surface3);border:1px solid var(--border2);color:var(--text2)}

.btn{padding:10px 18px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff;border:none}
.btn-primary:hover{opacity:0.88}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,92,92,0.3)}
.btn-pink{background:var(--pink-bg);color:var(--pink);border:1px solid rgba(248,124,190,0.3)}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(61,220,132,0.3)}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(255,179,71,0.3)}

.lesson-focus{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--r);padding:8px 14px;font-size:13px;color:var(--text2);margin-bottom:14px;flex-wrap:wrap}
.lesson-focus strong{color:var(--accent)}

.mode-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.mode-chip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all 0.15s}
.mode-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.mode-chip.active.blind-chip{background:var(--blue);border-color:var(--blue)}
.mode-chip.active.strict-chip{background:var(--red);border-color:var(--red)}
.mode-chip.active.pause-chip{background:var(--amber);border-color:var(--amber)}

.keyboard-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-top:14px}
.keyboard-row{display:flex;justify-content:center;gap:5px;margin-bottom:5px}
.key{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-family:'JetBrains Mono',monospace;transition:all 0.1s;position:relative;flex-shrink:0}
.key.active-key{transform:scale(1.18);box-shadow:0 0 0 3px var(--accent);background:var(--accent);color:#fff;border-color:var(--accent)}
.key.error-key{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.space-key{width:180px}
.finger-dot{width:5px;height:5px;border-radius:50%;position:absolute;bottom:3px;right:3px}

/* Progress bars */
.progress-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.4s ease;background:var(--accent)}
.progress-fill.green{background:var(--green)}
.progress-fill.amber{background:var(--amber)}
.progress-fill.red{background:var(--red)}
.progress-fill.pink{background:var(--pink)}

/* Results */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:36px;text-align:center;margin-bottom:16px}
.result-score{font-size:72px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.result-grade{font-size:22px;font-weight:700;margin-top:8px}
.result-stats{display:flex;gap:20px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.result-stat .rs-val{font-size:28px;font-weight:700}
.result-stat .rs-label{font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge-gold{background:rgba(255,179,71,0.15);color:var(--amber);border:1px solid rgba(255,179,71,0.3)}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(61,220,132,0.3)}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(79,195,247,0.3)}

.coach-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:16px}
.coach-tip{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.coach-tip:last-child{border-bottom:none;padding-bottom:0}

/* Analytics */
.chart-area{height:140px;position:relative;margin:8px 0}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:100%}
.chart-bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;transition:height 0.4s ease;cursor:pointer;position:relative}
.chart-bar:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;white-space:nowrap;margin-bottom:4px;color:var(--text);z-index:10}

.page-tabs{display:flex;gap:3px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px}
.page-tab{flex:1;padding:7px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.page-tab.active{background:var(--accent);color:#fff}

.finger-guide{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.finger-chip{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border)}
.finger-dot-lg{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* Goals */
.goal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:12px}
.goal-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.goal-label{font-size:13px;font-weight:500}
.goal-value{font-size:13px;color:var(--text2)}
.goal-done{color:var(--green);font-weight:700}

/* Achievements */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.ach-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;display:flex;align-items:center;gap:12px;transition:all 0.2s}
.ach-card.earned{border-color:var(--amber);background:rgba(255,179,71,0.05)}
.ach-card.locked{opacity:0.4}
.ach-icon{font-size:24px;flex-shrink:0}
.ach-info h4{font-size:13px;font-weight:600;margin-bottom:2px}
.ach-info p{font-size:11px;color:var(--text2)}

/* Notify toast */
.toast-wrap{position:fixed;top:70px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--amber);border-radius:var(--r);padding:10px 16px;font-size:13px;font-weight:500;color:var(--amber);box-shadow:var(--shadow);animation:slideIn 0.3s ease,fadeOut 0.4s ease 3.6s forwards;pointer-events:none;max-width:280px}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}

/* Animations */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.shake{animation:shake 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 1s ease infinite}

/* Custom practice */
.custom-keys-input{width:100%;padding:12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;outline:none;font-family:'JetBrains Mono',monospace}
.custom-keys-input:focus{border-color:var(--accent)}

/* RTL support */
[dir="rtl"] .typing-display{direction:rtl;text-align:right}

/* Pause overlay */
.pause-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.7);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:10}
.pause-overlay h2{font-size:28px;font-weight:700;color:#fff}
.pause-overlay p{color:rgba(255,255,255,0.6);font-size:14px}

@media(max-width:640px){
  .nav{height:auto;padding:10px 12px}.nav-tabs{gap:0}.nav-tab{padding:5px 8px;font-size:11px}
  .typing-display{font-size:20px}.result-score{font-size:52px}
  .stat-pill .sp-val{font-size:14px}
}
`;

// ════════════════════════════════════════════════════════════════
// TOAST SYSTEM
// ════════════════════════════════════════════════════════════════

function ToastContainer({toasts}){
  return(
    <div className="toast-wrap">
      {toasts.map(t=><div key={t.id} className="toast">{t.msg}</div>)}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════════════════════════════

function App(){
  const [store,setStore]=useState(load);
  const [page,setPage]=useState('dashboard');
  const [activeLesson,setActiveLesson]=useState(null);
  const [practiceState,setPracticeState]=useState(null);
  const [practiceMode,setPracticeMode]=useState('lesson'); // 'lesson'|'weak'|'custom'
  const [customConfig,setCustomConfig]=useState(null);
  const [toasts,setToasts]=useState([]);

  useEffect(()=>{ save(store); },[store]);

  useEffect(()=>{
    const today=new Date().toDateString();
    if(store.lastPracticeDate!==today){
      const yesterday=new Date(Date.now()-86400000).toDateString();
      if(store.lastPracticeDate && store.lastPracticeDate!==today && store.lastPracticeDate!==yesterday){
        setStore(s=>({...s,streak:0}));
      }
    }
  },[]);

  const addToast=(msg)=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);
  };

  const updateStore=(updater)=>setStore(s=>({...s,...updater(s)}));

  const startLesson=(lesson, mode='lesson')=>{
    setActiveLesson(lesson);
    setPracticeMode(mode);
    setPage('practice');
    setPracticeState(null);
  };

  const startCustom=(config)=>{
    setCustomConfig(config);
    setPracticeMode('custom');
    setActiveLesson({id:'custom', name:'Custom Drill', keys:config.keys, level:1, desc:'Custom key practice', words:[], isArabic:config.isArabic});
    setPage('practice');
    setPracticeState(null);
  };

  const startWeakMode=()=>{
    const weakKeys=getWeakKeys(store.keyStats);
    if(!weakKeys.length){ addToast('Practice more lessons first to detect weak keys!'); return; }
    setActiveLesson({id:'weak', name:'Weak Key Drill', keys:weakKeys.join(''), level:1, desc:`Targeting: ${weakKeys.join(', ')}`, words:[], isWeak:true});
    setPracticeMode('weak');
    setPage('practice');
    setPracticeState(null);
  };

  const finishSession=(result)=>{
    const today=new Date().toDateString();
    const xpGained=Math.floor(result.accuracy/10)+Math.floor(result.wpm/5)+10+(result.errors===0?20:0);
    const newXp=store.xp+xpGained;
    const newLevel=calcLevel(newXp);
    const isNewDay=store.lastPracticeDate!==today;
    const yesterday=new Date(Date.now()-86400000).toDateString();
    const newStreak=isNewDay?(store.lastPracticeDate===yesterday?store.streak+1:1):store.streak;

    let newUnlocked=[...store.unlockedLessons];
    let newCompleted=[...store.completedLessons];
    if(result.accuracy>=80 && activeLesson.id!=='weak' && activeLesson.id!=='custom'){
      if(!newCompleted.includes(activeLesson.id)) newCompleted.push(activeLesson.id);
      const nextId=typeof activeLesson.id==='number'?activeLesson.id+1:null;
      if(nextId&&nextId<=LESSONS.length&&!newUnlocked.includes(nextId)) newUnlocked.push(nextId);
      if(nextId&&nextId+1<=LESSONS.length&&!newUnlocked.includes(nextId+1)) newUnlocked.push(nextId+1);
    }

    const newKeyStats={...store.keyStats};
    Object.entries(result.keyStats||{}).forEach(([k,v])=>{
      if(!newKeyStats[k]) newKeyStats[k]={total:0,errors:0};
      newKeyStats[k].total+=v.total;
      newKeyStats[k].errors+=v.errors;
    });

    // daily goals
    const dp=store.dailyProgress||{};
    const isToday=dp.date===today;
    const newDP={
      date:today,
      sessions:(isToday?(dp.sessions||0):0)+1,
      minutes:(isToday?(dp.minutes||0):0)+Math.floor((result.duration||0)/60),
      bestAccuracy:Math.max(isToday?(dp.bestAccuracy||0):0, result.accuracy),
    };

    const newSession={...result, lessonId:activeLesson.id, date:new Date().toISOString(), xpGained, mode:practiceMode, isArabic:activeLesson.isArabic||false, blindMode:store.settings?.blindMode||false};
    const newSessions=[...store.sessions, newSession].slice(-100);

    const newStore={
      ...store,
      xp:newXp, level:newLevel,
      streak:newStreak, lastPracticeDate:today,
      completedLessons:newCompleted,
      unlockedLessons:newUnlocked,
      totalTime:(store.totalTime||0)+(result.duration||0),
      keyStats:newKeyStats,
      sessions:newSessions,
      dailyProgress:newDP,
    };

    // check achievements
    const prevAch=store.achievements||[];
    const newAch=checkNewAchievements(newStore,prevAch);
    if(newAch.length){
      newStore.achievements=[...prevAch,...newAch];
      newAch.forEach(id=>{
        const a=ACHIEVEMENTS.find(x=>x.id===id);
        if(a) setTimeout(()=>addToast(`${a.icon} Achievement unlocked: ${a.name}!`),500);
      });
    }

    if(newLevel>store.level) addToast(`⚡ Level Up! You're now Level ${newLevel}!`);

    setStore(newStore);
    setPracticeState({...result,xpGained});
  };

  const theme=store.theme||'dark';
  const toggleTheme=()=>updateStore(()=>({theme:theme==='dark'?'light':'dark'}));
  const isArabic=store.settings?.arabicMode||false;

  const weakKeys=getWeakKeys(store.keyStats);
  const weekSessions=store.sessions.filter(s=>{ const d=new Date(s.date); return (Date.now()-d)<7*86400000});
  const avgAcc=weekSessions.length?Math.round(weekSessions.reduce((a,s)=>a+s.accuracy,0)/weekSessions.length):0;
  const avgWpm=weekSessions.length?Math.round(weekSessions.reduce((a,s)=>a+s.wpm,0)/weekSessions.length):0;

  const NAV_TABS=[
    {id:'dashboard',label:'Dashboard'},
    {id:'lessons',label:'Lessons'},
    {id:'practice',label:'Practice'},
    {id:'custom',label:'Custom'},
    {id:'analytics',label:'Analytics'},
    {id:'achievements',label:'Badges'},
    {id:'settings',label:'Settings'},
  ];

  return(
    <div data-theme={theme} className="app">
      <style>{STYLES}</style>
      <ToastContainer toasts={toasts}/>
      <nav className="nav">
        <div className="nav-logo">⌨ <span>Type</span>Coach <span style={{fontSize:11,background:'var(--accent)',color:'#fff',padding:'2px 6px',borderRadius:4,marginLeft:4}}>PRO</span></div>
        <div className="nav-tabs">
          {NAV_TABS.map(t=>(
            <button key={t.id} className={`nav-tab${page===t.id?' active':''}`}
              onClick={()=>{ if(t.id!=='practice')setPage(t.id); else if(activeLesson)setPage('practice'); else setPage('lessons'); }}>
              {t.label}
            </button>
          ))}
        </div>
        <div className="nav-right">
          <span className="streak-badge">🔥 {store.streak}</span>
          <div className="xp-badge">⚡ {store.xp} XP · Lv{store.level||1}</div>
          <div className="lang-badge" onClick={()=>updateStore(s=>({settings:{...s.settings,arabicMode:!s.settings?.arabicMode}}))}>{isArabic?'🌙 عربي':'🌍 EN'}</div>
          <button className="theme-btn" onClick={toggleTheme}>{theme==='dark'?'☀':'🌙'}</button>
        </div>
      </nav>

      {page==='dashboard' && <Dashboard store={store} onStart={startLesson} onWeakMode={startWeakMode} weakKeys={weakKeys} avgAcc={avgAcc} avgWpm={avgWpm} isArabic={isArabic}/>}
      {page==='lessons' && <LessonsPage store={store} onStart={startLesson} isArabic={isArabic}/>}
      {page==='practice' && (
        activeLesson
          ? practiceState
            ? <ResultScreen result={practiceState} lesson={activeLesson} keyStats={store.keyStats} onRetry={()=>setPracticeState(null)} onNext={()=>{const nx=LESSONS.find(l=>l.id===activeLesson.id+1&&store.unlockedLessons.includes(l.id));if(nx){setActiveLesson(nx);setPracticeState(null);}else setPage('lessons');}} onDash={()=>setPage('dashboard')} store={store}/>
            : <PracticeScreen lesson={activeLesson} store={store} practiceMode={practiceMode} customConfig={customConfig} onFinish={finishSession} onBack={()=>setPage('lessons')}/>
          : <div className="page"><div style={{textAlign:'center',padding:'80px 0',color:'var(--text2)'}}>
              <div style={{fontSize:48,marginBottom:16}}>⌨</div>
              <div style={{fontSize:20,fontWeight:600,marginBottom:8}}>No lesson selected</div>
              <button className="btn btn-primary" onClick={()=>setPage('lessons')}>Browse Lessons</button>
            </div></div>
      )}
      {page==='custom' && <CustomPage onStart={startCustom} store={store}/>}
      {page==='analytics' && <AnalyticsPage store={store}/>}
      {page==='achievements' && <AchievementsPage store={store}/>}
      {page==='settings' && <SettingsPage store={store} updateStore={updateStore}/>}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════════════

function Dashboard({store,onStart,onWeakMode,weakKeys,avgAcc,avgWpm,isArabic}){
  const today=new Date().toDateString();
  const practicedToday=store.lastPracticeDate===today;
  const nextLesson=LESSONS.find(l=>store.unlockedLessons.includes(l.id)&&!store.completedLessons.includes(l.id));
  const totalMinutes=Math.floor((store.totalTime||0)/60);
  const dp=store.dailyProgress||{};
  const isToday=dp.date===today;
  const goals=store.dailyGoals||{sessions:1,minutes:10,accuracy:80};
  const dSessions=isToday?(dp.sessions||0):0;
  const dMinutes=isToday?(dp.minutes||0):0;
  const dAcc=isToday?(dp.bestAccuracy||0):0;
  const earnedAch=(store.achievements||[]).length;

  function hour2time(){const h=new Date().getHours();if(h<12)return'morning';if(h<17)return'afternoon';return'evening';}

  return(
    <div className="page fade-in">
      <div className="hero">
        <h1>Good {hour2time()}, Touch Typist 👋</h1>
        <p>{practicedToday?"You've already practiced today — keep the streak alive!":"Ready for today's session? 5 minutes a day builds real muscle memory."}</p>
        <div style={{display:'flex',gap:10,marginTop:20,flexWrap:'wrap'}}>
          {nextLesson && <button className="btn btn-primary" onClick={()=>onStart(nextLesson)}>Continue: {nextLesson.name} →</button>}
          <button className="btn btn-pink" onClick={onWeakMode}>💪 Weak Key Drill {weakKeys.length?`(${weakKeys.join('')})`:''}</button>
        </div>
      </div>

      {/* Daily Goals */}
      <div className="section-title">📅 Today's Goals</div>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:20,marginBottom:24}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:16}}>
          {[
            {label:'Sessions',done:dSessions,goal:goals.sessions,unit:'',color:'var(--accent)'},
            {label:'Minutes',done:dMinutes,goal:goals.minutes,unit:'min',color:'var(--blue)'},
            {label:'Best Accuracy',done:Math.round(dAcc),goal:goals.accuracy,unit:'%',color:'var(--green)'},
          ].map(({label,done,goal,unit,color})=>{
            const pct=Math.min(done/goal*100,100);
            const isDone=done>=goal;
            return(
              <div key={label}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontSize:13,fontWeight:500}}>{label}</span>
                  <span style={{fontSize:13,color:isDone?'var(--green)':'var(--text2)',fontWeight:isDone?700:400}}>{done}{unit} / {goal}{unit} {isDone?'✓':''}</span>
                </div>
                <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:color}}></div></div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="stat-grid">
        <div className="stat-card amber"><div className="label">Daily Streak</div><div className="value">🔥 {store.streak}</div><div className="sub">days in a row</div></div>
        <div className="stat-card accent"><div className="label">Total XP</div><div className="value">{store.xp}</div><div className="sub">Level {store.level||1}</div></div>
        <div className="stat-card green"><div className="label">Avg Accuracy</div><div className="value">{avgAcc||'—'}%</div><div className="sub">this week</div></div>
        <div className="stat-card"><div className="label">Avg WPM</div><div className="value">{avgWpm||'—'}</div><div className="sub">this week</div></div>
        <div className="stat-card"><div className="label">Lessons Done</div><div className="value">{store.completedLessons.length}</div><div className="sub">of {LESSONS.length}</div></div>
        <div className="stat-card pink"><div className="label">Badges</div><div className="value">{earnedAch}</div><div className="sub">of {ACHIEVEMENTS.length}</div></div>
        <div className="stat-card"><div className="label">Practice Time</div><div className="value">{totalMinutes}</div><div className="sub">minutes total</div></div>
      </div>

      {weakKeys.length>0 && (
        <div style={{background:'var(--red-bg)',border:'1px solid rgba(255,92,92,0.2)',borderRadius:'var(--r2)',padding:18,marginBottom:20}}>
          <div className="section-title" style={{color:'var(--red)',marginBottom:8}}>⚠ Weak Keys Detected</div>
          <p style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>These keys have the highest error rate. Target them with a Weak Key drill!</p>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
            {weakKeys.map(k=>(
              <span key={k} style={{background:'var(--red-bg)',border:'1px solid rgba(255,92,92,0.4)',borderRadius:6,padding:'4px 12px',fontFamily:'JetBrains Mono',fontSize:18,fontWeight:700,color:'var(--red)'}}>{k}</span>
            ))}
          </div>
          <button className="btn btn-danger btn-sm" onClick={onWeakMode}>Start Weak Key Drill →</button>
        </div>
      )}

      <div className="section-title">Recent Sessions</div>
      {store.sessions.length===0
        ? <div style={{textAlign:'center',padding:40,color:'var(--text3)'}}>No sessions yet — start your first lesson!</div>
        : <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {store.sessions.slice(-5).reverse().map((s,i)=>{
            const l=LESSONS.find(l=>l.id===s.lessonId)||ARABIC_LESSONS.find(l=>l.id===s.lessonId)||{name:s.mode==='weak'?'Weak Key Drill':s.mode==='custom'?'Custom Drill':'?'};
            return(
              <div key={i} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13,display:'flex',alignItems:'center',gap:6}}>{l.name}{s.blindMode&&<span className="badge badge-blue" style={{padding:'1px 6px',fontSize:10}}>blind</span>}{s.isArabic&&<span className="badge" style={{padding:'1px 6px',fontSize:10,background:'var(--pink-bg)',color:'var(--pink)',border:'1px solid rgba(248,124,190,0.3)'}}>عربي</span>}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{fmtDate(s.date)}</div>
                </div>
                <div style={{display:'flex',gap:14,alignItems:'center'}}>
                  <div style={{textAlign:'center'}}><div style={{fontFamily:'JetBrains Mono',fontWeight:700,color:s.accuracy>=90?'var(--green)':s.accuracy>=70?'var(--amber)':'var(--red)'}}>{Math.round(s.accuracy)}%</div><div style={{fontSize:10,color:'var(--text3)'}}>acc</div></div>
                  <div style={{textAlign:'center'}}><div style={{fontFamily:'JetBrains Mono',fontWeight:700,color:'var(--accent)'}}>{Math.round(s.wpm)}</div><div style={{fontSize:10,color:'var(--text3)'}}>wpm</div></div>
                  <span className={`badge ${s.accuracy>=90?'badge-gold':'badge-green'}`}>{s.accuracy>=90?'🏆 Elite':s.accuracy>=80?'✨ Good':'💪 Keep going'}</span>
                </div>
              </div>
            );
          })}
        </div>
      }
    </div>
  );
}

function LessonsPage({store,onStart,isArabic}){
  const [tab,setTab]=useState(isArabic?'arabic':'english');
  const levelNames={1:'Beginner',2:'Easy',3:'Intermediate',4:'Advanced',5:'Proficient',6:'Expert',7:'Master'};
  const levelColors={1:'l1',2:'l2',3:'l3',4:'l4',5:'l5',6:'l5',7:'l5'};

  const renderLesson=(l,isAr=false)=>{
    const unlocked=store.unlockedLessons.includes(l.id);
    const completed=store.completedLessons.includes(l.id);
    return(
      <div key={l.id} className={`lesson-card${!unlocked?' locked':''}${completed?' completed':''}${isAr?' arabic-card':''}`} onClick={()=>unlocked&&onStart(l)}>
        <div className={`lesson-tag ${isAr?'arabic':levelColors[l.level]||'l1'}`}>{isAr?'عربي':levelNames[l.level]||'Level '+l.level}</div>
        <h3>{l.name}</h3>
        <p>{l.desc}</p>
        <div className="lesson-keys">{l.keys}</div>
        {!unlocked && <div style={{marginTop:8,fontSize:11,color:'var(--text3)'}}>🔒 Complete previous lessons to unlock</div>}
      </div>
    );
  };

  return(
    <div className="page fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:700}}>Lessons</h2>
          <p style={{color:'var(--text2)',fontSize:13}}>{store.completedLessons.length}/{LESSONS.length+ARABIC_LESSONS.length} completed</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className={`btn btn-sm ${tab==='english'?'btn-primary':'btn-secondary'}`} onClick={()=>setTab('english')}>🌍 English</button>
          <button className={`btn btn-sm ${tab==='arabic'?'btn-pink':'btn-secondary'}`} onClick={()=>setTab('arabic')}>🌙 Arabic</button>
        </div>
      </div>
      <div className="lesson-grid">
        {tab==='english' && LESSONS.map(l=>renderLesson(l,false))}
        {tab==='arabic' && ARABIC_LESSONS.map(l=>renderLesson(l,true))}
      </div>
    </div>
  );
}

// PRACTICE SCREEN
// ════════════════════════════════════════════════════════════════

function PracticeScreen({lesson,store,practiceMode,customConfig,onFinish,onBack}){
  const settings=store.settings||{};
  const isArabic=lesson.isArabic||false;
  const isWeak=practiceMode==='weak';
  const isCustom=practiceMode==='custom';
  const isBlind=settings.blindMode||false;
  const isStrict=settings.typingMode==='strict';

  const weakKeys=getWeakKeys(store.keyStats);
  const initText=useMemo(()=>{
    if(isWeak) return generateWeakDrillText(weakKeys);
    if(isCustom&&customConfig) return generateCustomText(customConfig.keys, customConfig.isArabic);
    return generateText(lesson, weakKeys);
  },[]);

  const [text,setText]=useState(initText);
  const [typed,setTyped]=useState('');
  const [started,setStarted]=useState(false);
  const [startTime,setStartTime]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const [keyStats,setKeyStats]=useState({});
  const [lastError,setLastError]=useState(false);
  const [showKeyboard,setShowKeyboard]=useState(settings.showKeyboard||false);
  const [paused,setPaused]=useState(false);
  const [totalKeystrokes,setTotalKeystrokes]=useState(0);
  const [correctStrokes,setCorrectStrokes]=useState(0);
  const inputRef=useRef();
  const timerRef=useRef();
  const typedRef=useRef('');
  const textRef=useRef(text);
  const pausedRef=useRef(false);
  const finishedRef=useRef(false);
  const duration=(customConfig?.duration||settings.sessionDuration||10)*60;

  useEffect(()=>{ textRef.current=text; },[text]);
  useEffect(()=>{ typedRef.current=typed; },[typed]);
  useEffect(()=>{ pausedRef.current=paused; },[paused]);

  useEffect(()=>{
    if(inputRef.current) inputRef.current.focus();
  },[]);

  useEffect(()=>{
    if(started&&!timerRef.current){
      timerRef.current=setInterval(()=>{
        if(!pausedRef.current){
          setElapsed(e=>{
            const ne=e+1;
            if(ne>=duration&&!finishedRef.current){ finishedRef.current=true; clearInterval(timerRef.current); timerRef.current=null; }
            return ne;
          });
        }
      },1000);
    }
    return()=>{if(timerRef.current){clearInterval(timerRef.current);timerRef.current=null;}};
  },[started,duration]);

  useEffect(()=>{
    if(elapsed>=duration&&started&&!finishedRef.current){ finishedRef.current=true; doFinish(); }
  },[elapsed]);

  const doFinish=useCallback(()=>{
    clearInterval(timerRef.current);
    timerRef.current=null;
    const t=typedRef.current;
    const tx=textRef.current;
    let correct=0;
    for(let i=0;i<t.length;i++) if(t[i]===tx[i]) correct++;
    const acc=t.length?Math.round(correct/t.length*100):100;
    const mins=Math.max(elapsed,1)/60;
    const grossWpm=Math.round((t.length/5)/mins);
    let errs=0;
    for(let i=0;i<t.length;i++) if(t[i]!==tx[i]) errs++;
    const netWpm=Math.max(0,Math.round(grossWpm-(errs/mins)));
    onFinish({accuracy:acc,wpm:grossWpm,netWpm,grossWpm,errors:errs,duration:elapsed,keyStats});
  },[elapsed,keyStats,onFinish]);

  const grossWpm=useMemo(()=>{
    if(!startTime||!typed.length) return 0;
    const mins=(Date.now()-startTime)/60000;
    return Math.round((typed.length/5)/Math.max(mins,0.01));
  },[typed,startTime]);

  const accuracy=useMemo(()=>{
    if(!typed.length) return 100;
    let c=0; for(let i=0;i<typed.length;i++) if(typed[i]===text[i]) c++;
    return Math.round(c/typed.length*100);
  },[typed,text]);

  const errors=useMemo(()=>{
    let e=0; for(let i=0;i<typed.length;i++) if(typed[i]!==text[i]) e++;
    return e;
  },[typed,text]);

  const netWpm=useMemo(()=>{
    if(!startTime||!typed.length) return 0;
    const mins=(Date.now()-startTime)/60000;
    return Math.max(0,Math.round(grossWpm-(errors/Math.max(mins,0.01))));
  },[grossWpm,errors,startTime]);

  const handleKey=useCallback((e)=>{
    if(e.key==='Escape'){onBack();return;}
    if(e.key==='F9'){setPaused(p=>!p);return;}
    if(pausedRef.current) return;
    if(e.metaKey||e.ctrlKey) return;
    if(e.key.length!==1&&e.key!=='Backspace') return;
    e.preventDefault();
    if(!started){setStarted(true);setStartTime(Date.now());}

    if(e.key==='Backspace'){
      setTyped(t=>t.slice(0,-1));
      setLastError(false);
      return;
    }
    const ch=e.key;
    setTyped(prev=>{
      const expected=textRef.current[prev.length]||'';
      const correct=ch===expected;
      // Strict mode: block wrong characters
      if(isStrict&&!correct) return prev;
      setTotalKeystrokes(k=>k+1);
      if(correct) setCorrectStrokes(k=>k+1);
      setKeyStats(ks=>{
        const k=expected.toLowerCase();
        const cur=ks[k]||{total:0,errors:0};
        return{...ks,[k]:{total:cur.total+1,errors:cur.errors+(correct?0:1)}};
      });
      setLastError(!correct);
      const next=prev+ch;
      if(next.length>=textRef.current.length){
        setTimeout(()=>{
          const nt=isWeak?generateWeakDrillText(weakKeys):isCustom?generateCustomText(customConfig?.keys||'',customConfig?.isArabic||false):generateText(lesson,weakKeys);
          setText(nt);
          setTyped('');
          setLastError(false);
        },200);
      }
      return next;
    });
  },[text,started,lesson,isStrict,isWeak,isCustom,customConfig,weakKeys,onBack]);

  useEffect(()=>{
    window.addEventListener('keydown',handleKey);
    return()=>window.removeEventListener('keydown',handleKey);
  },[handleKey]);

  const timeLeft=Math.max(0,duration-elapsed);
  const timerPct=Math.min((elapsed/duration)*100,100);
  const expectedChar=text[typed.length]||'';

  return(
    <div className="page fade-in">
      <div className="practice-header">
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← Back</button>
        <div className="practice-stats">
          <div className="stat-pill sp-acc"><div><div className="sp-label">Accuracy</div><div className="sp-val">{accuracy}%</div></div></div>
          <div className="stat-pill sp-wpm"><div><div className="sp-label">Gross WPM</div><div className="sp-val">{grossWpm}</div></div></div>
          <div className="stat-pill sp-net"><div><div className="sp-label">Net WPM</div><div className="sp-val">{netWpm}</div></div></div>
          <div className="stat-pill sp-timer"><div><div className="sp-label">Time Left</div><div className="sp-val">{fmtTime(timeLeft)}</div></div></div>
          <div className="stat-pill sp-err"><div><div className="sp-label">Errors</div><div className="sp-val">{errors}</div></div></div>
        </div>
        <button className="btn btn-primary btn-sm" onClick={doFinish}>Finish</button>
      </div>

      <div style={{background:'var(--surface2)',borderRadius:'var(--r)',height:4,marginBottom:16,overflow:'hidden'}}>
        <div style={{height:'100%',background:'var(--accent)',borderRadius:'var(--r)',width:`${timerPct}%`,transition:'width 1s linear'}}></div>
      </div>

      {/* Mode banners */}
      {paused && <div className="focus-banner paused"><span style={{fontSize:18}}>⏸</span><span>Session paused — press F9 or click Resume to continue</span><button className="btn btn-sm btn-secondary" style={{marginLeft:'auto'}} onClick={()=>setPaused(false)}>Resume →</button></div>}
      {!paused && isBlind && <div className="focus-banner blind"><span style={{fontSize:18}}>🙈</span><span>Blind Mode — your typing is hidden to build pure muscle memory</span></div>}
      {!paused && isStrict && <div className="focus-banner strict"><span style={{fontSize:18}}>🔒</span><span>Strict Mode — you must type the correct key before advancing</span></div>}
      {!paused && isWeak && <div className="focus-banner weak"><span style={{fontSize:18}}>💪</span><span>Weak Key Drill — targeting your most error-prone keys: <strong>{weakKeys.join(', ')}</strong></span></div>}
      {!paused && !isBlind && !isStrict && !isWeak && <div className="focus-banner eyes"><span style={{fontSize:18}}>👁</span><span>Keep your eyes on the screen — do not look at the keyboard!</span></div>}

      <div className="lesson-focus">
        {isWeak?<span>Targeting: <strong>{lesson.keys}</strong></span>:<span>Lesson: <strong>{lesson.name}</strong> · {lesson.desc}</span>}
        <span style={{marginLeft:'auto',display:'flex',gap:6'}}>
          {isBlind&&<span className="badge badge-blue" style={{fontSize:11,padding:'2px 8px'}}>🙈 Blind</span>}
          {isStrict&&<span className="badge" style={{fontSize:11,padding:'2px 8px',background:'var(--red-bg)',color:'var(--red)',border:'1px solid rgba(255,92,92,0.3)'}}>🔒 Strict</span>}
          {isArabic&&<span className="badge" style={{fontSize:11,padding:'2px 8px',background:'var(--pink-bg)',color:'var(--pink)',border:'1px solid rgba(248,124,190,0.3)'}}>🌙 Arabic</span>}
        </span>
      </div>

      <div className="typing-area" style={{position:'relative'}} onClick={()=>{inputRef.current?.focus();if(paused)setPaused(false);}}>
        <input ref={inputRef} style={{position:'absolute',opacity:0,width:0,height:0}} readOnly tabIndex={-1}/>
        {!started && <div style={{color:'var(--text3)',fontSize:13,marginBottom:12,textAlign:'center'}}>Click and start typing to begin</div>}
        {paused && <div className="pause-overlay"><h2>⏸ Paused</h2><p>Click anywhere or press F9 to resume</p></div>}
        <div className={`typing-display${isArabic?' arabic-display':''}${lastError&&!isStrict?' shake':''}`} dir={isArabic?'rtl':'ltr'}>
          {text.split('').map((ch,i)=>{
            let cls='char pending';
            if(i<typed.length){
              cls='char '+(typed[i]===ch?'correct':'error');
              if(isBlind) cls+=' blind';
            }
            if(i===typed.length){
              cls='char current';
              if(isBlind) cls+=' blind';
            }
            return <span key={i} className={cls}>{ch}</span>;
          })}
        </div>
      </div>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
        <FingerGuide targetKey={expectedChar} isArabic={isArabic}/>
        <div style={{display:'flex',gap:6'}}>
          <button className="btn btn-secondary btn-sm" onClick={()=>setPaused(p=>!p)}>{paused?'▶ Resume':'⏸ Pause'}</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setShowKeyboard(v=>!v)}>{showKeyboard?'Hide Keys':'Show Keys'}</button>
        </div>
      </div>

      {showKeyboard && !isArabic && <KeyboardViz activeKey={expectedChar} errorKey={lastError&&!isStrict?expectedChar:null} keyStats={keyStats}/>}
      {!showKeyboard && <div style={{textAlign:'center',padding:14,color:'var(--text3)',fontSize:13}}>💪 Keyboard hidden — trust your muscle memory! (F9 = pause)</div>}

      <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:14,flexWrap:'wrap'}}>
        <button className="btn btn-secondary" onClick={()=>{setTyped('');setLastError(false);finishedRef.current=false;}}>↺ Restart Text</button>
        <button className="btn btn-primary" onClick={doFinish}>Finish Session →</button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// FINGER GUIDE
// ════════════════════════════════════════════════════════════════

function FingerGuide({targetKey,isArabic}){
  if(isArabic) return <div style={{fontSize:12,color:'var(--text2)'}}>🌙 Arabic mode — focus on accuracy over speed</div>;
  if(!targetKey||targetKey===' ') return(
    <div style={{fontSize:12,color:'var(--text2)',display:'flex',alignItems:'center',gap:6}}>
      <span style={{display:'inline-block',width:36,height:14,border:'2px solid var(--border2)',borderRadius:3,background:'var(--surface2)'}}></span>
      Space — both thumbs
    </div>
  );
  const finger=FINGER_MAP[targetKey.toLowerCase()];
  if(!finger) return null;
  const color=FINGER_COLORS[finger]||'var(--accent)';
  const fingerNames={'left-pinky':'Left Pinky','left-ring':'Left Ring','left-middle':'Left Middle','left-index':'Left Index','right-index':'Right Index','right-middle':'Right Middle','right-ring':'Right Ring','right-pinky':'Right Pinky'};
  return(
    <div style={{display:'flex',alignItems:'center',gap:7,fontSize:12}}>
      <span style={{width:10,height:10,borderRadius:'50%',background:color,flexShrink:0,display:'inline-block'}}></span>
      <span style={{color:'var(--text2)'}}>Key <strong style={{color:'var(--text)',fontFamily:'JetBrains Mono'}}>{targetKey}</strong> → {fingerNames[finger]||finger}</span>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// KEYBOARD VIZ
// ════════════════════════════════════════════════════════════════

function KeyboardViz({activeKey,errorKey,keyStats}){
  const ak=(activeKey||'').toLowerCase();
  return(
    <div className="keyboard-wrap fade-in">
      {KEYBOARD_LAYOUT.map((row,ri)=>(
        <div key={ri} className="keyboard-row" style={{paddingLeft:[0,20,38][ri]}}>
          {row.map(k=>{
            const isActive=ak===k;
            const isError=errorKey&&(errorKey.toLowerCase()===k);
            const stat=keyStats?.[k];
            const errRate=stat&&stat.total>0?stat.errors/stat.total:0;
            const fingerColor=FINGER_COLORS[FINGER_MAP[k]]||'#888';
            return(
              <div key={k} className={`key${isActive?' active-key':''}${isError?' error-key':''}`}>
                {k}
                <span className="finger-dot" style={{background:fingerColor,opacity:0.7}}></span>
                {errRate>0.2&&<span style={{position:'absolute',top:-2,right:-2,width:5,height:5,borderRadius:'50%',background:'var(--red)'}}></span>}
              </div>
            );
          })}
        </div>
      ))}
      <div className="keyboard-row"><div className="key space-key" style={{fontFamily:'DM Sans',fontSize:10,color:'var(--text3)'}}>SPACE</div></div>
      <div className="finger-guide">
        {Object.entries(FINGER_COLORS).map(([f,c])=>(
          <div key={f} className="finger-chip"><span className="finger-dot-lg" style={{background:c}}></span><span style={{fontSize:10}}>{f.replace('-',' ')}</span></div>
        ))}

    </div>
  );
}

// RESULT SCREEN
// ════════════════════════════════════════════════════════════════

function ResultScreen({result,lesson,keyStats,onRetry,onNext,onDash,store}){
  const grade=result.accuracy>=95?'S':result.accuracy>=90?'A':result.accuracy>=80?'B':result.accuracy>=70?'C':'D';
  const gradeColor={S:'var(--green)',A:'var(--accent)',B:'var(--blue)',C:'var(--amber)',D:'var(--red)'}[grade];
  const nextLesson=LESSONS.find(l=>l.id===lesson.id+1&&store.unlockedLessons.includes(l.id));
  const coachTips=useMemo(()=>generateCoachFeedback(result, store.keyStats),[result, store.keyStats]);

  return(
    <div className="page fade-in">
      <div className="result-card">
        <div style={{marginBottom:6,color:'var(--text2)',fontSize:13}}>Session Complete!</div>
        <div className="result-score" style={{color:gradeColor}}>{grade}</div>
        <div className="result-grade" style={{color:gradeColor}}>{grade==='S'?'Perfect!':grade==='A'?'Excellent!':grade==='B'?'Good Job!':grade==='C'?'Keep Practicing!':'Needs Work'}</div>
        <div className="result-stats">
          <div className="result-stat"><div className="rs-val" style={{color:'var(--green)'}}>{Math.round(result.accuracy)}%</div><div className="rs-label">Accuracy</div></div>
          <div className="result-stat"><div className="rs-val" style={{color:'var(--accent)'}}>{Math.round(result.grossWpm||result.wpm)}</div><div className="rs-label">Gross WPM</div></div>
          <div className="result-stat"><div className="rs-val" style={{color:'var(--blue)'}}>{Math.round(result.netWpm||result.wpm)}</div><div className="rs-label">Net WPM</div></div>
          <div className="result-stat"><div className="rs-val" style={{color:'var(--red)'}}>{result.errors}</div><div className="rs-label">Errors</div></div>
          <div className="result-stat"><div className="rs-val" style={{color:'var(--amber)'}}>{fmtTime(result.duration||0)}</div><div className="rs-label">Time</div></div>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
          <span className="badge badge-gold">⚡ +{result.xpGained||0} XP</span>
          {result.accuracy>=90&&<span className="badge badge-gold">🏆 Accuracy Master</span>}
          {(result.grossWpm||result.wpm)>=40&&<span className="badge badge-green">🚀 Speed Demon</span>}
          {result.errors===0&&result.duration>30&&<span className="badge badge-gold">💎 Perfect Round</span>}
          {result.blindMode&&<span className="badge badge-blue">🙈 Blind Mode</span>}
        </div>
      </div>

      {/* AI Coach Feedback */}
      <div className="coach-card">
        <div className="section-title">🤖 Coach Feedback</div>
        {coachTips.map((tip,i)=>(
          <div key={i} className="coach-tip">
            <span style={{fontSize:13,color:'var(--text)',lineHeight:1.5}}>{tip}</span>
          </div>
        ))}
      </div>

      {/* Key Performance */}
      {Object.keys(result.keyStats||{}).length>0 && (
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:18,marginBottom:14}}>
          <div className="section-title">Key Performance This Session</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {Object.entries(result.keyStats).sort(([,a],[,b])=>(b.errors/b.total)-(a.errors/a.total)).map(([k,v])=>{
              const rate=v.total>0?v.errors/v.total:0;
              const bg=rate>0.3?'var(--red-bg)':rate>0.1?'var(--amber-bg)':'var(--green-bg)';
              const col=rate>0.3?'var(--red)':rate>0.1?'var(--amber)':'var(--green)';
              return(
                <div key={k} style={{background:bg,border:`1px solid ${col}44`,borderRadius:7,padding:'7px 12px',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:18,fontWeight:700,color:col}}>{k}</div>
                  <div style={{fontSize:10,color:'var(--text2)'}}>{v.total>0?Math.round((1-rate)*100):100}%</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
        <button className="btn btn-secondary" onClick={onDash}>Dashboard</button>
        <button className="btn btn-secondary" onClick={onRetry}>↺ Retry</button>
        {nextLesson&&<button className="btn btn-primary" onClick={onNext}>Next: {nextLesson.name} →</button>}
      </div>
    </div>
  );
}

function CustomPage({onStart,store}){
  const [keys,setKeys]=useState('');
  const [duration,setDuration]=useState(5);
  const [isArabic,setIsArabic]=useState(false);
  const [preview,setPreview]=useState('');

  useEffect(()=>{
    if(keys.trim()) setPreview(generateCustomText(keys,isArabic).slice(0,80)+'...');
    else setPreview('');
  },[keys,isArabic]);

  const handleStart=()=>{
    if(!keys.trim()){ alert('Please enter keys or text to practice.'); return; }
    onStart({keys,duration,isArabic});
  };

  return(
    <div className="page fade-in" style={{maxWidth:600}}>
      <h2 style={{fontSize:22,fontWeight:700,marginBottom:8}}>Custom Practice Builder</h2>
      <p style={{color:'var(--text2)',fontSize:14,marginBottom:24}}>Design your own drill around specific keys or text you want to master.</p>

      <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:20}}>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'16px 18px'}}>
          <div style={{fontWeight:500,fontSize:14,marginBottom:8}}>Keys or characters to practice</div>
          <input className="custom-keys-input" placeholder="e.g. asdfjkl; or type a phrase" value={keys} onChange={e=>setKeys(e.target.value)}/>
          <p style={{fontSize:12,color:'var(--text3)',marginTop:6}}>Enter letters, numbers, or paste a phrase. Drills will be generated around these characters.</p>
        </div>

        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'16px 18px'}}>
          <div style={{fontWeight:500,fontSize:14,marginBottom:8}}>Session Duration</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {[2,5,10,15].map(m=>(
              <button key={m} className={`btn btn-sm ${duration===m?'btn-primary':'btn-secondary'}`} onClick={()=>setDuration(m)}>{m} min</button>
            ))}
          </div>
        </div>

        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'16px 18px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontWeight:500,fontSize:14}}>Arabic Mode</div>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>Switch to Arabic RTL typing</div>
          </div>
          <Toggle val={isArabic} onChange={setIsArabic}/>
        </div>

        {preview&&(
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'14px 18px'}}>
            <div style={{fontSize:12,color:'var(--text3)',marginBottom:6}}>Preview drill text:</div>
            <div style={{fontFamily:'JetBrains Mono',fontSize:14,color:'var(--text2)',lineHeight:1.6,direction:isArabic?'rtl':'ltr'}}>{preview}</div>
          </div>
        )}
      </div>

      <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={handleStart}>Start Custom Drill →</button>

      {/* Weak Keys Quick Start */}
      {getWeakKeys(store.keyStats).length>0&&(
        <div style={{marginTop:20,background:'var(--pink-bg)',border:'1px solid rgba(248,124,190,0.3)',borderRadius:'var(--r)',padding:16}}>
          <div style={{fontWeight:500,fontSize:14,color:'var(--pink)',marginBottom:6}}>💡 Quick: Weak Key Auto-Fill</div>
          <p style={{fontSize:12,color:'var(--text2)',marginBottom:10}}>Your weakest keys are: <strong style={{fontFamily:'JetBrains Mono'}}>{getWeakKeys(store.keyStats).join(' ')}</strong></p>
          <button className="btn btn-pink btn-sm" onClick={()=>setKeys(getWeakKeys(store.keyStats).join(''))}>Use My Weak Keys</button>
        </div>
      )}
    </div>
  );
}

function HeatmapKeyboard({keyStats}){
  return(
    <div>
      {KEYBOARD_LAYOUT.map((row,ri)=>(
        <div key={ri} className="keyboard-row" style={{paddingLeft:[0,20,38][ri]}}>
          {row.map(k=>{
            const stat=keyStats[k];
            const errRate=stat&&stat.total>0?stat.errors/stat.total:0;
            const intensity=Math.min(errRate*3,1);
            const r=Math.round(255*intensity);
            const g=Math.round(220*(1-intensity*0.8));
            const bg=stat?`rgba(${r},${g},60,${0.15+intensity*0.6})`:'var(--surface2)';
            const textCol=intensity>0.5?'var(--red)':intensity>0.2?'var(--amber)':stat?'var(--green)':'var(--text3)';
            return(
              <div key={k} className="key" style={{background:bg,color:textCol,borderColor:intensity>0.3?'rgba(255,92,92,0.4)':'var(--border2)'}}>
                {k}
                {stat&&<span style={{position:'absolute',bottom:2,right:2,fontSize:8,color:'inherit'}}>{stat.total}</span>}
              </div>
            );
          })}
        </div>
      ))}
      <div style={{display:'flex',gap:8,marginTop:10,alignItems:'center',fontSize:11,color:'var(--text3)'}}>
        <span>🟢 Few errors</span><span>🟡 Some errors</span><span>🔴 Many errors</span>
        <span style={{marginLeft:'auto'}}>Numbers = total keypresses</span>
      </div>
    </div>
  );
}

        </SettingRow>
        <SettingRow label="Show Keyboard by Default" desc="Show on-screen keyboard when session starts">
          <Toggle val={!!s.showKeyboard} onChange={v=>set('showKeyboard',v)}/>
        </SettingRow>
        <SettingRow label="Arabic Mode" desc="Switch to Arabic RTL typing globally">
          <Toggle val={!!s.arabicMode} onChange={v=>set('arabicMode',v)}/>
        </SettingRow>
      </div>

      {/* Daily Goals */}
      <div className="section-title">Daily Goals</div>
      <div style={{display:'flex',flexDirection:'column',gap:1,marginBottom:20}}>
        <SettingRow label="Sessions per Day" desc="How many sessions to complete daily">
          <div style={{display:'flex',gap:6}}>
            {[1,2,3,5].map(n=>(
              <button key={n} className={`btn btn-sm ${g.sessions===n?'btn-primary':'btn-secondary'}`} onClick={()=>setGoal('sessions',n)}>{n}</button>
            ))}
          </div>
        </SettingRow>
        <SettingRow label="Practice Minutes" desc="Target practice time per day">
          <div style={{display:'flex',gap:6}}>
            {[5,10,15,30].map(m=>(
              <button key={m} className={`btn btn-sm ${g.minutes===m?'btn-primary':'btn-secondary'}`} onClick={()=>setGoal('minutes',m)}>{m}m</button>
            ))}
          </div>
        </SettingRow>
        <SettingRow label="Accuracy Goal" desc="Target accuracy percentage for the day">
          <div style={{display:'flex',gap:6}}>
            {[70,80,90,95].map(a=>(
              <button key={a} className={`btn btn-sm ${g.accuracy===a?'btn-primary':'btn-secondary'}`} onClick={()=>setGoal('accuracy',a)}>{a}%</button>
            ))}
          </div>
        </SettingRow>
      </div>

      {/* Appearance */}
      <div className="section-title">Appearance</div>
      <div style={{marginBottom:20}}>
        <SettingRow label="Theme" desc="Dark or light mode">
          <div style={{display:'flex',gap:6}}>
            <button className={`btn btn-sm ${store.theme==='dark'?'btn-primary':'btn-secondary'}`} onClick={()=>updateStore(()=>({theme:'dark'}))}>🌙 Dark</button>
            <button className={`btn btn-sm ${store.theme==='light'?'btn-primary':'btn-secondary'}`} onClick={()=>updateStore(()=>({theme:'light'}))}>☀ Light</button>
          </div>
        </SettingRow>
      </div>

      {/* Data Export */}
      <div className="section-title">Data</div>
      <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
        <button className="btn btn-secondary" onClick={()=>exportJSON(store)}>⬇ Export All Data (JSON)</button>
        <button className="btn btn-secondary" onClick={()=>exportCSV(store.sessions)}>⬇ Export Sessions (CSV)</button>
      </div>

      {/* Danger */}
      <div style={{background:'var(--red-bg)',border:'1px solid rgba(255,92,92,0.25)',borderRadius:'var(--r)',padding:'16px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
        <div><div style={{fontWeight:500,fontSize:14,color:'var(--red)'}}>Reset All Progress</div><div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>Permanently erases all stats, XP, streaks, and history.</div></div>
        <button className="btn btn-danger btn-sm" onClick={()=>{if(confirm('Reset all progress? This cannot be undone.')){localStorage.removeItem(STORAGE_KEY);location.reload();}}}>Reset</button>
      </div>

      {/* Snapshot */}
      <div style={{marginTop:20,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:16}}>
        <div style={{fontWeight:500,fontSize:13,marginBottom:8}}>Progress Snapshot</div>
        <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.9}}>
          <div>Streak: <strong style={{color:'var(--amber)'}}>{store.streak} days 🔥</strong></div>
          <div>XP: <strong style={{color:'var(--accent)'}}>{store.xp} · Level {store.level||1}</strong></div>
          <div>Lessons: <strong>{store.completedLessons.length}/{LESSONS.length+ARABIC_LESSONS.length}</strong></div>
          <div>Sessions: <strong>{store.sessions.length}</strong></div>
          <div>Keys tracked: <strong>{Object.keys(store.keyStats||{}).length}</strong></div>
          <div>Achievements: <strong>{(store.achievements||[]).length}/{ACHIEVEMENTS.length}</strong></div>
        </div>
      </div>
    </div>
  );
}

function SettingRow({label,desc,children}){
  return(
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:14,flexWrap:'wrap'}}>
      <div><div style={{fontWeight:500,fontSize:14}}>{label}</div>{desc&&<div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{desc}</div>}</div>
      {children}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
