function getWeakKeys(keyStats, n = 5) {
    return Object.entries(keyStats)
        .filter(([, v]) => v.total > 3)
        .sort(([, a], [, b]) => (b.errors / b.total) - (a.errors / a.total))
        .slice(0, n).map(([k]) => k);
}
function generateWeakDrillText(weakKeys) {
    if (!weakKeys.length)
        return 'asdf jkl; asdf jkl;';
    const drills = [];
    weakKeys.forEach(k => {
        drills.push(k.repeat(5));
        if (weakKeys.length > 1) {
            const pair = weakKeys[(weakKeys.indexOf(k) + 1) % weakKeys.length];
            drills.push((k + pair).repeat(3));
        }
    });
    const allWords = LESSONS.flatMap(l => l.words).filter(w => weakKeys.some(k => w.includes(k)));
    const picked = allWords.sort(() => Math.random() - 0.5).slice(0, 6);
    return [...drills, ...picked].sort(() => Math.random() - 0.5).slice(0, 10).join(' ');
}
function generateText(lesson, weakKeys = []) {
    let pool = [...lesson.words];
    if (weakKeys.length) {
        const extras = LESSONS.flatMap(l => l.words).filter(w => weakKeys.some(k => w.includes(k)));
        if (extras.length)
            pool = [...pool, ...extras, ...extras];
    }
    return pool.sort(() => Math.random() - 0.5).slice(0, 8).join(' ');
}
function generateCustomText(keys, isArabic = false) {
    if (!keys.trim())
        return 'type something here';
    const ks = keys.toLowerCase().replace(/\s/g, '').split('');
    if (isArabic)
        return keys.repeat ? keys + ' ' + keys : keys;
    const drills = [];
    ks.forEach(k => { drills.push(k.repeat(4)); });
    ks.forEach((k, i) => { if (i < ks.length - 1)
        drills.push(k + ks[i + 1] + k + ks[i + 1]); });
    const matchWords = LESSONS.flatMap(l => l.words).filter(w => ks.some(k => w.includes(k)));
    const extra = matchWords.sort(() => Math.random() - 0.5).slice(0, 5);
    return [...drills, ...extra].sort(() => Math.random() - 0.5).join(' ');
}
function calcXpForLevel(l) { return l * 200; }
function calcLevel(xp) { let l = 1, acc = 0; while (acc + calcXpForLevel(l) <= xp) {
    acc += calcXpForLevel(l);
    l++;
} return l; }
function fmtTime(s) { const m = Math.floor(s / 60); const sec = s % 60; return `${m}:${sec.toString().padStart(2, '0')}`; }
function fmtDate(d) { if (!d)
    return 'Never'; const now = new Date(); const diff = Math.floor((now - new Date(d)) / (1000 * 60 * 60 * 24)); if (diff === 0)
    return 'Today'; if (diff === 1)
    return 'Yesterday'; return `${diff}d ago`; }
function generateCoachFeedback(result, keyStats) {
    const tips = [];
    const weakKeys = getWeakKeys(keyStats, 3);
    const fingerGroups = {
        'Pinky keys': ['q', 'a', 'z', 'p', ';'],
        'Ring finger': ['w', 's', 'x', 'o', 'l'],
        'Middle finger': ['e', 'd', 'c', 'i', 'k'],
        'Index finger': ['r', 'f', 'v', 't', 'g', 'y', 'h', 'n', 'u', 'j', 'm'],
    };
    let worstFinger = null, worstRate = 0;
    Object.entries(fingerGroups).forEach(([finger, keys]) => {
        let tot = 0, err = 0;
        keys.forEach(k => { const st = keyStats[k]; if (st) {
            tot += st.total;
            err += st.errors;
        } });
        if (tot > 5 && err / tot > worstRate) {
            worstRate = err / tot;
            worstFinger = finger;
        }
    });
    if (worstFinger && worstRate > 0.2)
        tips.push(`⚠ You struggle with ${worstFinger} — try the Weak Key drill.`);
    if (result.accuracy < 70)
        tips.push('🎯 Accuracy below 70% — slow down and focus on correct keys, not speed.');
    else if (result.accuracy >= 95 && result.wpm < 30)
        tips.push('✨ Great accuracy! Now challenge yourself to increase speed gradually.');
    else if (result.accuracy >= 90)
        tips.push('🏆 Excellent accuracy! Your muscle memory is building nicely.');
    if (result.wpm >= 50)
        tips.push('🚀 Impressive speed! Make sure accuracy stays above 90%.');
    if (weakKeys.length)
        tips.push(`💡 Keys needing attention: ${weakKeys.map(k => `"${k}"`).join(', ')} — try Weak Key Mode.`);
    if (result.errors === 0)
        tips.push('💎 Zero errors! Perfect session — your fingers are learning fast.');
    if (!tips.length)
        tips.push('👍 Good session! Consistency is the key to improvement.');
    return tips.slice(0, 3);
}
function checkNewAchievements(store, prevAchievements) {
    const earned = [];
    ACHIEVEMENTS.forEach(a => {
        if (!prevAchievements.includes(a.id) && a.check(store))
            earned.push(a.id);
    });
    return earned;
}
function exportJSON(store) {

    a.click();
    URL.revokeObjectURL(url);
}
function exportCSV(sessions) {
    const header = 'Date,Lesson,Accuracy,WPM,Errors,Duration(s),XP,Mode';
    const rows = sessions.map(s => [
        new Date(s.date).toLocaleString(),
        s.lessonId,
        Math.round(s.accuracy),
        Math.round(s.wpm),
        s.errors,
        s.duration || 0,
        s.xpGained || 0,
        s.mode || 'normal',
    ].join(','));
    const blob = new Blob([[header, ...rows].join('\n')], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'typecoach_sessions.csv';
    a.click();
    URL.revokeObjectURL(url);
}

.btn{padding:10px 18px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
