baseURL = "https://blog.almubaireek.com/"
title = "Saad ALMubaireek – EE Projects & Experiments"
theme = "PaperMod"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

[languages]

  [languages.en]
    languageName = "English"
    weight = 1
    contentDir = "content/en"

    [languages.en.params]
      heroTitle = "Exploring Electrical Engineering, One Quirky Project at a Time"
      heroSubTitle = "PCB design, 3D enclosures, and microcontroller boards"

    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "Home"
        url = "/"
        weight = 1

      [[languages.en.menu.main]]
        name = "Projects"
        url = "/projects/"
        weight = 2

      [[languages.en.menu.main]]
        name = "Personal projects"
        url = "/personal-projects/"
        weight = 3

      # ✅ CRITICAL FIX: identifier must be a UNIQUE page path (not "Eco-Drive")
      [[languages.en.menu.main]]
        name = "Eco-Drive"
        identifier = "/projects/eco-drive"
        pageRef = "/projects/eco-drive"
        url = "/projects/eco-drive/"
        weight = 4

      # ✅ Same rule here
      [[languages.en.menu.main]]
        name = "Smart IoT Electric Extension"
        identifier = "/projects/smart-iot-electric-extension"
        pageRef = "/projects/smart-iot-electric-extension"
        url = "/projects/smart-iot-electric-extension/"
        weight = 5

      [[languages.en.menu.main]]
        name = "Tutorials"
        url = "/tutorials/"
        weight = 6

      [[languages.en.menu.main]]
        name = "3D Design"
        url = "/3d-design/"
        weight = 7

      [[languages.en.menu.main]]
        name = "About"
        url = "/about/"
        weight = 8

      [[languages.en.menu.main]]
        name = "Contact"
        url = "/contact/"
        weight = 9
      [[languages.en.menu.main]]
        name = "TypeCoach"
        url = "/typecoach/"
        weight = 10

[pagination]
  pagerSize = 5

[params]
  defaultTheme = "auto"
  showSocial = true
  showSocialEmpty = false
  ShowReadingTime = false
  ShowBreadCrumbs = true
  ShowShareButtons = true
  ShareButtons = ["linkedin", "whatsapp", "email"]
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  heroEnable = true
  heroImage = "/images/hero-banner.jpg"
  sidebarShow = true
  sidebarWidgets = ["search","categories","social","downloads"]
  ShowLangSwitch = false

[params.social]
  github = "https://github.com/s2qx"
  linkedin = "https://www.linkedin.com/in/saad-khaild-almubaireek"
  whatsapp = "https://wa.me/547252287"
  email = "mailto:saad@almubaireek.com"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true